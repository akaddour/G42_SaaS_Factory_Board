name: AI Ideation Expert

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  analyze-idea:
    runs-on: ubuntu-latest
    # Only trigger for issues using the SaaS Product Idea Nomination template
    if: contains(github.event.issue.body, 'SaaS Product Idea Nomination')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read evaluation criteria
        id: criteria
        run: |
          CRITERIA=$(cat docs/stage-criteria.md)
          echo "criteria<<EOF" >> $GITHUB_OUTPUT
          echo "$CRITERIA" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Analyze idea with AI
        id: analysis
        uses: actions/github-script@v7
        env:
          COMPASS_API_KEY: ${{ secrets.COMPASS_API_KEY }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        with:
          script: |
            const https = require('https');

            const systemPrompt = `You are a senior SaaS strategy expert evaluating product ideas for the G42 SaaS Factory Board.

            ## Evaluation Criteria

            ### Submission Completeness (5 Required Items)
            1. Problem statement is clear and specific (not generic)
            2. ICP (Ideal Customer Profile) is well-defined with specific personas
            3. Success metrics are proposed and measurable
            4. Constraints are captured (data residency, compliance, integrations)
            5. Named owners are assigned (not TBD or placeholder names)

            ### Quality Signals to Assess
            - Is the value hypothesis quantified (cost savings, time saved, revenue impact)?
            - Is differentiation specific to G42/Azure capabilities?
            - Is SaaS readiness assessed (Track A/B)? Flag if marked "Unknown"
            - Is there customer evidence (pipeline, existing customers)?

            ### Red-Flag Conditions (Auto-HOLD)
            1. No viable tenancy or data isolation approach for target segment
            2. No design partner or pilot path (no credible customer access)
            3. No accountable product owner (unowned initiative)
            4. Unit economics structurally negative with no mitigation path

            ## Output Format
            Provide your assessment using EXACTLY this markdown structure (no extra formatting or headers):

            ### 🔍 AI Ideation Expert Assessment

            **Verdict:** [Strong / Promising / Needs Work / Concerns]

            #### Strengths
            - [Specific positives from the submission]

            #### Gaps & Recommendations
            - [What's missing and how to fix it]

            #### Competitive Landscape
            - **[Competitor 1]** — [Brief description]
            - **[Competitor 2]** — [Brief description]
            - **[Competitor 3]** — [Brief description]

            #### Red-Flag Check
            - [Status of each of the 4 conditions: ✅ Clear / ⚠️ Warning / ❌ Flagged]

            ## Guidelines
            - Be constructive and specific — reference actual content from the submission
            - Do NOT be generic — explain exactly what's missing
            - Keep assessment to 200-300 words
            - Focus on actionable feedback`;

            const userPrompt = `Analyze this SaaS product idea submission:

            **Title:** ${process.env.ISSUE_TITLE}

            **Submission:**
            ${process.env.ISSUE_BODY}

            Provide your expert assessment following the exact format specified.`;

            const requestBody = JSON.stringify({
              model: 'gpt-4o',
              max_tokens: 1500,
              messages: [
                { role: 'system', content: systemPrompt },
                { role: 'user', content: userPrompt }
              ]
            });

            const options = {
              hostname: 'api.core42.ai',
              path: '/v1/chat/completions',
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${process.env.COMPASS_API_KEY}`
              }
            };

            const response = await new Promise((resolve, reject) => {
              const req = https.request(options, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  if (res.statusCode === 200) {
                    resolve(JSON.parse(data));
                  } else {
                    reject(new Error(`API error ${res.statusCode}: ${data}`));
                  }
                });
              });
              req.on('error', reject);
              req.write(requestBody);
              req.end();
            });

            const assessment = response.choices[0].message.content;

            // Post the comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: assessment
            });

            return assessment;

      - name: Add AI Reviewed Label
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['status:ai-reviewed']
            });
