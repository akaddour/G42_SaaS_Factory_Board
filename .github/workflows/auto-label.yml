name: Auto Label Issues

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read

jobs:
  add-labels:
    runs-on: ubuntu-latest
    outputs:
      issue_number: ${{ github.event.issue.number }}
    steps:
      - name: Format Issue Body
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            let body = issue.body || '';

            // Only format issues created from the Idea Nomination template
            if (!body.includes('## SaaS Product Idea Nomination')) return;

            // --- 1. Convert JSON arrays to bullet lists ---
            // Matches: ["item1","item2"] on its own line
            body = body.replace(/^\[("[^"]*"(?:,\s*"[^"]*")*)\]$/gm, (match, inner) => {
              try {
                const items = JSON.parse(`[${inner}]`);
                return items.map(item => `- ${item}`).join('\n');
              } catch (e) {
                return match;
              }
            });

            // --- 2. Convert ### headings to bold Q&A format ---
            // Transforms:
            //   ### Field Label
            //   Answer text
            // Into:
            //   **Field Label**
            //   > Answer text
            const lines = body.split('\n');
            const formatted = [];
            let i = 0;

            while (i < lines.length) {
              const line = lines[i];

              // Match ### field headings (but not ## section headers or checklist headers)
              if (line.startsWith('### ') && !line.includes('Ideate Stage') && !line.includes('SaaS Product Idea Nomination')) {
                const label = line.replace('### ', '');
                formatted.push(`**${label}**`);

                // Collect the answer lines until next heading or end
                i++;
                const answerLines = [];
                while (i < lines.length && !lines[i].startsWith('### ') && !lines[i].startsWith('## ') && !lines[i].startsWith('---')) {
                  if (lines[i].trim() !== '') {
                    answerLines.push(lines[i]);
                  }
                  i++;
                }

                if (answerLines.length > 0) {
                  // If answer has bullet points, keep them as-is
                  const hasBullets = answerLines.some(l => l.trim().startsWith('- '));
                  if (hasBullets) {
                    formatted.push(answerLines.join('\n'));
                  } else {
                    // Single or multi-line answer: use blockquote
                    formatted.push(answerLines.map(l => `> ${l}`).join('\n'));
                  }
                } else {
                  formatted.push('> _No response_');
                  // Don't skip the next line since the while loop already advanced
                }

                formatted.push(''); // blank line after each field
                continue;
              }

              formatted.push(line);
              i++;
            }

            body = formatted.join('\n');

            // --- 3. Insert section headers ---
            const sections = [
              { before: '**Affiliate / Business Unit**', header: '## 1. Basics' },
              { before: '**Problem Statement**', header: '## 2. Problem & Solution' },
              { before: '**Success Metrics (Initial)**', header: '## 3. Market & Evidence' },
              { before: '**SaaS Readiness (Initial)**', header: '## 4. Technical Readiness' },
              { before: '**Requested Support - Microsoft**', header: '## 5. Requested Support' },
              { before: '**Initial Resource Estimate**', header: '## 6. Planning & Ownership' },
            ];

            for (const section of sections) {
              if (body.includes(section.before)) {
                body = body.replace(section.before, `---\n\n${section.header}\n\n${section.before}`);
              }
            }

            // Update the issue body
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: body
            });

      - name: Add Labels
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';

            // Map BU names to labels
            const buMapping = {
              'Presight': 'bu:presight',
              'Analog': 'bu:analog',
              'Core42': 'bu:core42',
              'M42': 'bu:m42',
              'Inception': 'bu:inception',
              'Astratech': 'bu:astratech',
              'Khazna Data Centers': 'bu:khazna',
              'AIQ': 'bu:aiq',
              'CPX': 'bu:cpx',
              'Space42': 'bu:space42'
            };

            // Map idea types to labels
            const typeMapping = {
              'Greenfield': 'type:greenfield',
              'Brownfield': 'type:brownfield',
              'White-label': 'type:whitelabel'
            };

            // Map verticals to labels
            const verticalMapping = {
              'Healthcare': 'vertical:healthcare',
              'Government': 'vertical:government',
              'Financial Services': 'vertical:financial-services',
              'Cybersecurity': 'vertical:cybersecurity',
              'Education': 'vertical:education'
            };

            // Map SaaS readiness / track to labels
            const trackMapping = {
              'Track A': 'track:a-saas-ready',
              'SaaS-ready': 'track:a-saas-ready',
              'Track B': 'track:b-modernize-first',
              'Modernize-first': 'track:b-modernize-first'
            };

            const labelsToAdd = [];

            // Find BU in issue body
            for (const [bu, label] of Object.entries(buMapping)) {
              if (body.includes(bu)) {
                labelsToAdd.push(label);
                break;
              }
            }

            // Find idea type in issue body
            for (const [type, label] of Object.entries(typeMapping)) {
              if (body.includes(type)) {
                labelsToAdd.push(label);
                break;
              }
            }

            // Find vertical in issue body
            let verticalFound = false;
            for (const [vertical, label] of Object.entries(verticalMapping)) {
              if (body.includes(vertical)) {
                labelsToAdd.push(label);
                verticalFound = true;
                break;
              }
            }
            if (!verticalFound && body.includes('Other')) {
              labelsToAdd.push('vertical:other');
            }

            // Find track/SaaS readiness in issue body
            for (const [track, label] of Object.entries(trackMapping)) {
              if (body.includes(track)) {
                labelsToAdd.push(label);
                break;
              }
            }

            // Add stakeholder label (BU is always the lead in Ideate)
            labelsToAdd.push('stakeholder:bu');

            if (labelsToAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: labelsToAdd
              });
            }

  notify-submitter:
    needs: add-labels
    uses: ./.github/workflows/send-notifications.yml
    with:
      event_type: idea-submitted-submitter
      issue_number: ${{ github.event.issue.number }}
      recipients: submitter_only
    secrets:
      POWER_AUTOMATE_WEBHOOK_URL: ${{ secrets.POWER_AUTOMATE_WEBHOOK_URL }}
      ADMIN_NOTIFICATION_EMAILS: ${{ secrets.ADMIN_NOTIFICATION_EMAILS }}

  notify-admins:
    needs: add-labels
    uses: ./.github/workflows/send-notifications.yml
    with:
      event_type: idea-submitted-admin
      issue_number: ${{ github.event.issue.number }}
      recipients: admins_only
      notify_admins: true
    secrets:
      POWER_AUTOMATE_WEBHOOK_URL: ${{ secrets.POWER_AUTOMATE_WEBHOOK_URL }}
      ADMIN_NOTIFICATION_EMAILS: ${{ secrets.ADMIN_NOTIFICATION_EMAILS }}
