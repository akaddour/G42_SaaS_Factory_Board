name: Stage Gate Transition

on:
  issues:
    types: [labeled]

permissions:
  issues: write
  contents: read

jobs:
  stage-gate:
    runs-on: ubuntu-latest
    outputs:
      notification_event: ${{ steps.gate.outputs.notification_event }}
      notification_vars: ${{ steps.gate.outputs.notification_vars }}
    steps:
      - name: Handle Stage Transition
        id: gate
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labelAdded = context.payload.label.name;
            const currentLabels = issue.labels.map(l => l.name);

            // Re-fetch issue to get latest body
            const { data: freshIssue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number
            });
            const body = freshIssue.body || '';

            // Only process stage and decision labels
            const isStageLabel = labelAdded.startsWith('stage:');
            const isDecisionLabel = labelAdded.startsWith('decision:');
            const isRedFlag = labelAdded === 'status:red-flag';

            // Handle decision label notifications
            if (isDecisionLabel) {
              const decisionNames = {
                'decision:go-fast-track': 'GO Fast-track',
                'decision:go-modernize': 'GO Modernize-first',
                'decision:hold': 'HOLD',
                'decision:kill': 'KILL'
              };
              const decision = decisionNames[labelAdded] || labelAdded;
              core.setOutput('notification_event', 'decision-made');
              core.setOutput('notification_vars', JSON.stringify({ decision }));
              return;
            }

            // Handle red-flag notification
            if (isRedFlag) {
              core.setOutput('notification_event', 'red-flag-raised');
              core.setOutput('notification_vars', '{}');
              return;
            }

            if (!isStageLabel) return;

            // Define stage order and previous stage mapping
            const stageOrder = ['stage:ideate', 'stage:validate', 'stage:build', 'stage:sell', 'stage:review'];
            const previousStage = {
              'stage:validate': 'stage:ideate',
              'stage:build': 'stage:validate',
              'stage:sell': 'stage:build',
              'stage:review': 'stage:sell'
            };

            // Stakeholder lead per stage
            const stakeholderMap = {
              'stage:ideate': 'stakeholder:bu',
              'stage:validate': 'stakeholder:group',
              'stage:build': 'stakeholder:bu',
              'stage:sell': 'stakeholder:bu',
              'stage:review': 'stakeholder:group'
            };

            // Helper: count checked/unchecked checkboxes in text
            function checklistStatus(text) {
              const checked = (text.match(/- \[x\]/gi) || []).length;
              const unchecked = (text.match(/- \[ \]/g) || []).length;
              return { checked, unchecked, total: checked + unchecked };
            }

            // Helper: update issue body (append checklist)
            async function appendToBody(checklist) {
              const newBody = body + '\n\n' + checklist;
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: newBody
              });
            }

            // Helper: block transition
            async function blockTransition(fromStage, toStage, toLabel, reason) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                name: toLabel
              });

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['status:needs-info']
              });

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `⛔ **Stage transition blocked: ${fromStage} → ${toStage}**\n\n${reason}`
              });
            }

            // Helper: swap labels on successful transition
            async function swapLabels(oldStageLabel, newStageLabel) {
              if (currentLabels.includes(oldStageLabel)) {
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    name: oldStageLabel
                  });
                } catch (e) {}
              }

              for (const sl of ['stakeholder:bu', 'stakeholder:group', 'stakeholder:msft']) {
                if (currentLabels.includes(sl)) {
                  try {
                    await github.rest.issues.removeLabel({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: issue.number,
                      name: sl
                    });
                  } catch (e) {}
                }
              }
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: [stakeholderMap[newStageLabel]]
              });

              if (currentLabels.includes('status:ready-for-review')) {
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    name: 'status:ready-for-review'
                  });
                } catch (e) {}
              }
            }

            // === STAGE CHECKLISTS (appended to issue body) ===

            const validateChecklist = `---

            ## Validate Stage Checklist

            **Lead:** Group | **Support:** BUs, Microsoft

            ### Prioritization Scorecard (14 criteria, scored 0–5, weighted to 100 pts)

            #### Market & Strategic Fit
            - [ ] **1. Problem severity & urgency** (Score: /5) — Validated pain; urgency drivers; clear buyer
            - [ ] **2. Repeatability across customers** (Score: /5) — Clear repeatable use case; not bespoke
            - [ ] **3. Design partners / pipeline evidence** (Score: /5) — 2–3 design partners or credible pipeline
            - [ ] **4. Strategic alignment** (Score: /5) — Aligned to priority verticals / strategic mandates

            #### Commercial & Economics
            - [ ] **5. Pricing power / willingness to pay** (Score: /5) — WTP signal; pricing band tested
            - [ ] **6. Margin potential (COGS + cost-to-serve)** (Score: /5) — COGS drivers understood; GM path
            - [ ] **7. Sales motion feasibility** (Score: /5) — Direct/partner/co-sell path defined

            #### Technical & Delivery Feasibility
            - [ ] **8. SaaS readiness / complexity** (Score: /5) — Track A/B decided; key epics identified
            - [ ] **9. Security & compliance feasibility** (Score: /5) — Threat model v1; control mapping; evidence plan
            - [ ] **10. Operability (SRE readiness)** (Score: /5) — SLOs, DR approach, run ownership feasible
            - [ ] **11. Integration complexity** (Score: /5) — Integration map; known dependencies

            #### Partnership Leverage (Microsoft/ISE)
            - [ ] **12. Microsoft field verification strength** (Score: /5) — Field input; account relevance; objections
            - [ ] **13. Marketplace readiness path clarity** (Score: /5) — Listing requirements and path understood
            - [ ] **14. ISE accelerator fit / engineering leverage** (Score: /5) — ISE scope/accelerators identified

            ---

            ### Validation Templates (attach as comments or linked documents)
            - [ ] **Template 2:** Market Verification Pack completed (G42 + Microsoft)
            - [ ] **Template 3:** Technical Evaluation Pack completed
            - [ ] **Template 4:** Business Plan (Lite) completed
            - [ ] **Template 5:** Final Recommendation Memo (Gate Decision Record) completed

            ---

            ### Red-Flag Check (any unresolved = auto HOLD)
            - [ ] Viable tenancy / data isolation approach exists
            - [ ] Design partner or pilot path confirmed (credible customer access)
            - [ ] Accountable product owner assigned (not unowned)
            - [ ] Unit economics not structurally negative (mitigation path exists)

            ---

            ### Gate Decision
            > Admin: apply one of the following labels when the decision is made:
            > - \`decision:go-fast-track\` — GO: Fast-track to Build
            > - \`decision:go-modernize\` — GO: Modernize-first
            > - \`decision:hold\` — HOLD until conditions resolved
            > - \`decision:kill\` — KILL: idea not viable

            **Decision notes / conditions / dependencies:**
            _[To be filled by reviewer]_`.replace(/^            /gm, '');

            const buildChecklist = `---

            ## Build Stage — Product Intake Checklist

            **Lead:** BUs | **Support:** Group (ISE Engineers), Microsoft (Co-build, PLG)

            ### Business
            - [ ] Problem statement & ICP defined (Must, Owner: G42)
            - [ ] Market validation evidence (Should, Owner: Affiliate)
            - [ ] Product positioning & messaging (Must, Owner: G42)
            - [ ] Regulatory constraints identified (Must, Owner: Affiliate)

            ### Product Management
            - [ ] Product strategy & 12–18 month roadmap (Must, Owner: G42)
            - [ ] PRD / user journeys / backlog (Must, Owner: Affiliate)
            - [ ] Stage-gate plan and launch readiness checklist (Must, Owner: G42)

            ### Technology
            - [ ] Target architecture for Azure SaaS (Must, Owner: Affiliate)
            - [ ] Tenancy model selected (Must, Owner: G42)
            - [ ] Data partitioning and access controls (Must, Owner: Affiliate)
            - [ ] API strategy & versioning (Should, Owner: G42)

            ### DevOps
            - [ ] CI/CD pipeline aligned to golden pipeline (Must, Owner: G42)
            - [ ] Infrastructure as Code (IaC) & landing zones (Must, Owner: G42)
            - [ ] Observability implemented (Must, Owner: Affiliate)
            - [ ] DR/BCP and RTO/RPO defined and tested (Should, Owner: Affiliate)

            ### Security
            - [ ] Security baseline alignment (Must, Owner: G42)
            - [ ] Threat model completed and reviewed (Must, Owner: G42)
            - [ ] Pen test / vulnerability remediation plan (Must, Owner: Affiliate)
            - [ ] Compliance mapping & evidence pack (Should, Owner: G42)

            ### Finance
            - [ ] Business case & unit economics (Must, Owner: G42)
            - [ ] FinOps controls configured (Should, Owner: G42)

            ### Commercials
            - [ ] SKU packaging & tiering (Must, Owner: G42)
            - [ ] Metering & billing instrumentation (Must, Owner: G42)
            - [ ] Contract set ready — MSA/DPA/SLA/order form (Must, Owner: G42)
            - [ ] Support model and SLAs (Must, Owner: Affiliate)

            ### Operations
            - [ ] Runbooks and operational readiness review (Should, Owner: Affiliate)
            - [ ] Customer onboarding & provisioning workflow (Should, Owner: G42)

            ---

            ### Product Documentation Pack (for GO)
            - [ ] Product one-pager (problem, ICP, value, KPIs)
            - [ ] PRD-lite (MVP scope, journeys, acceptance criteria)
            - [ ] Architecture outline + tenancy decision record
            - [ ] Security feasibility pack (threat model v1 + evidence plan)
            - [ ] Commercial spec (pricing/packaging v1 + tier definitions)
            - [ ] Delivery plan (milestones, resourcing, risks, dependencies)
            - [ ] Operational readiness plan (SLOs, DR, runbooks, support model)
            - [ ] Marketplace readiness plan (if applicable)

            ---

            ### Product Roadmap (12–18 months)
            - [ ] MVP phase (0–90 days) — outcome, capabilities, milestones, dependencies
            - [ ] GA phase (90–180 days) — outcome, capabilities, milestones, dependencies
            - [ ] Scale phase (6–12 months) — outcome, capabilities, milestones, dependencies`.replace(/^            /gm, '');

            const sellChecklist = `---

            ## Sell Stage Checklist

            **Lead:** BUs (product sales with Group coordination) | **Group:** Strategic int'l markets and I3 accounts | **Microsoft:** Azure Marketplace activation

            ### Pricing & Packaging
            - [ ] Pricing tiers established
            - [ ] Licensing model confirmed
            - [ ] Discount policies set

            ### Sales Enablement
            - [ ] Product datasheets created
            - [ ] Demo scripts prepared
            - [ ] Case studies documented (if available)

            ### Azure Marketplace (if applicable)
            - [ ] Listing created and approved
            - [ ] Transact capability enabled
            - [ ] Co-sell ready status achieved

            ### Partner Channel
            - [ ] Partner agreements in place
            - [ ] Partner enablement completed
            - [ ] Joint marketing planned

            ### Customer Acquisition
            - [ ] Pilot customers onboarded
            - [ ] Reference customers identified
            - [ ] Revenue recognized`.replace(/^            /gm, '');

            const reviewChecklist = `---

            ## Review Stage Checklist

            **Lead:** Group (define/standardize KPIs) | **BUs:** Track Success KPIs, support feedback loops | **Microsoft:** Unified Support for similar services

            ### KPI Tracking
            | Category | Metrics |
            |----------|---------|
            | Revenue | ARR, MRR, growth rate |
            | Customers | Count, retention, NPS |
            | Product | Usage, adoption, feature utilization |
            | Operations | Uptime, support tickets, resolution time |

            - [ ] Metrics dashboard created
            - [ ] Baseline measurements taken
            - [ ] Targets established

            ### Customer Feedback
            - [ ] NPS surveys conducted
            - [ ] Feature requests compiled
            - [ ] Support trends analyzed

            ### Performance Review
            - [ ] Quarterly review held
            - [ ] Results vs targets analyzed
            - [ ] Lessons learned documented

            ### Improvement Planning
            - [ ] Enhancement priorities set
            - [ ] Technical debt addressed
            - [ ] Innovation opportunities identified

            ### Next Iteration
            - [ ] Version roadmap updated
            - [ ] Resource allocation confirmed
            - [ ] Timeline established

            ---

            > This is a continuous cycle. Schedule regular reviews and update this checklist each quarter.`.replace(/^            /gm, '');

            // === GATE CHECKS ===

            // Gate: Ideate → Validate
            if (labelAdded === 'stage:validate') {
              const status = checklistStatus(body);

              if (status.total > 0 && status.unchecked > 0) {
                await blockTransition('Ideate', 'Validate', 'stage:validate',
                  `The Ideate stage checklist is not complete. ${status.unchecked} of ${status.total} items still need to be checked.\n\nPlease complete all Ideate checklist items before transitioning to Validate.`);

                core.setOutput('notification_event', 'stage-transition-blocked');
                core.setOutput('notification_vars', JSON.stringify({
                  previous_stage: 'Ideate',
                  current_stage: 'Validate',
                  blocked_reason: `Ideate checklist incomplete: ${status.unchecked} of ${status.total} items still unchecked`
                }));
                return;
              }

              await swapLabels('stage:ideate', 'stage:validate');
              await appendToBody(validateChecklist);

              core.setOutput('notification_event', 'stage-transition-success');
              core.setOutput('notification_vars', JSON.stringify({
                previous_stage: 'Ideate',
                current_stage: 'Validate'
              }));
            }

            // Gate: Validate → Build
            if (labelAdded === 'stage:build') {
              const hasGoDecision = currentLabels.some(l => l.startsWith('decision:go'));
              const hasRedFlag = currentLabels.includes('status:red-flag');

              if (!hasGoDecision) {
                await blockTransition('Validate', 'Build', 'stage:build',
                  `A GO decision label is required before moving to Build.\n\nPlease apply one of:\n- \`decision:go-fast-track\`\n- \`decision:go-modernize\`\n\nIf the idea is not approved, apply \`decision:hold\` or \`decision:kill\` instead.`);

                core.setOutput('notification_event', 'stage-transition-blocked');
                core.setOutput('notification_vars', JSON.stringify({
                  previous_stage: 'Validate',
                  current_stage: 'Build',
                  blocked_reason: 'A GO decision label is required before moving to Build'
                }));
                return;
              }

              if (hasRedFlag) {
                await blockTransition('Validate', 'Build', 'stage:build',
                  `A \`status:red-flag\` override is active. Red-flag issues must be resolved before proceeding to Build.\n\n**Red-flag overrides (auto HOLD until resolved):**\n- No viable tenancy or data isolation approach for target segment\n- No design partner or pilot path (no credible customer access)\n- No accountable product owner (unowned initiative)\n- Unit economics structurally negative with no mitigation path\n\nRemove the \`status:red-flag\` label once all issues are resolved.`);

                core.setOutput('notification_event', 'stage-transition-blocked');
                core.setOutput('notification_vars', JSON.stringify({
                  previous_stage: 'Validate',
                  current_stage: 'Build',
                  blocked_reason: 'Red-flag override is active — must be resolved before proceeding to Build'
                }));
                return;
              }

              const status = checklistStatus(body);
              // Only check if there are Validate checklist items
              if (body.includes('Validate Stage Checklist') && status.total > 0 && status.unchecked > 0) {
                await blockTransition('Validate', 'Build', 'stage:build',
                  `The Validate stage checklist is not complete. ${status.unchecked} of ${status.total} items still need to be checked.\n\nPlease complete all Validate checklist items before transitioning to Build.`);

                core.setOutput('notification_event', 'stage-transition-blocked');
                core.setOutput('notification_vars', JSON.stringify({
                  previous_stage: 'Validate',
                  current_stage: 'Build',
                  blocked_reason: `Validate checklist incomplete: ${status.unchecked} of ${status.total} items still unchecked`
                }));
                return;
              }

              await swapLabels('stage:validate', 'stage:build');
              await appendToBody(buildChecklist);

              core.setOutput('notification_event', 'stage-transition-success');
              core.setOutput('notification_vars', JSON.stringify({
                previous_stage: 'Validate',
                current_stage: 'Build'
              }));
            }

            // Gate: Build → Sell
            if (labelAdded === 'stage:sell') {
              const status = checklistStatus(body);

              if (body.includes('Build Stage') && status.total > 0 && status.unchecked > 0) {
                await blockTransition('Build', 'Sell', 'stage:sell',
                  `The Build stage checklist is not complete. ${status.unchecked} of ${status.total} items still need to be checked.\n\nAll **Must** items in the Product Intake Checklist must be complete before transitioning to Sell.`);

                core.setOutput('notification_event', 'stage-transition-blocked');
                core.setOutput('notification_vars', JSON.stringify({
                  previous_stage: 'Build',
                  current_stage: 'Sell',
                  blocked_reason: `Build checklist incomplete: ${status.unchecked} of ${status.total} items still unchecked`
                }));
                return;
              }

              await swapLabels('stage:build', 'stage:sell');
              await appendToBody(sellChecklist);

              core.setOutput('notification_event', 'stage-transition-success');
              core.setOutput('notification_vars', JSON.stringify({
                previous_stage: 'Build',
                current_stage: 'Sell'
              }));
            }

            // Gate: Sell → Review
            if (labelAdded === 'stage:review') {
              const status = checklistStatus(body);

              if (body.includes('Sell Stage Checklist') && status.total > 0 && status.unchecked > 0) {
                await blockTransition('Sell', 'Review', 'stage:review',
                  `The Sell stage checklist is not complete. ${status.unchecked} of ${status.total} items still need to be checked.\n\nPlease complete all Sell checklist items before transitioning to Review.`);

                core.setOutput('notification_event', 'stage-transition-blocked');
                core.setOutput('notification_vars', JSON.stringify({
                  previous_stage: 'Sell',
                  current_stage: 'Review',
                  blocked_reason: `Sell checklist incomplete: ${status.unchecked} of ${status.total} items still unchecked`
                }));
                return;
              }

              await swapLabels('stage:sell', 'stage:review');
              await appendToBody(reviewChecklist);

              core.setOutput('notification_event', 'stage-transition-success');
              core.setOutput('notification_vars', JSON.stringify({
                previous_stage: 'Sell',
                current_stage: 'Review'
              }));
            }

  sync-board:
    needs: stage-gate
    if: needs.stage-gate.outputs.notification_event == 'stage-transition-success'
    runs-on: ubuntu-latest
    steps:
      - name: Sync Stage Label to Project Board
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const PROJECT_ID = 'PVT_kwHOALNmH84BNitD';
            const STAGE_FIELD_ID = 'PVTSSF_lAHOALNmH84BNitDzg8gaUE';

            const labelToOption = {
              'stage:ideate':    'a2cbc606',
              'stage:validate':  '191386a7',
              'stage:build':     'a6a853b2',
              'stage:sell':      '4eddb5b2',
              'stage:review':    'c420d033'
            };

            const newStageLabel = context.payload.label.name;
            const optionId = labelToOption[newStageLabel];
            if (!optionId) return;

            // Find the project item ID for this issue
            const query = `query($projectId: ID!) {
              node(id: $projectId) {
                ... on ProjectV2 {
                  items(first: 100) {
                    nodes {
                      id
                      content {
                        ... on Issue {
                          number
                        }
                      }
                    }
                  }
                }
              }
            }`;

            const result = await github.graphql(query, { projectId: PROJECT_ID });
            const items = result.node.items.nodes;
            const item = items.find(i => i.content?.number === context.payload.issue.number);

            if (!item) {
              console.log('Issue not found on project board, skipping sync.');
              return;
            }

            // Update the Stage field on the project board
            const mutation = `mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
              updateProjectV2ItemFieldValue(input: {
                projectId: $projectId
                itemId: $itemId
                fieldId: $fieldId
                value: { singleSelectOptionId: $optionId }
              }) {
                projectV2Item { id }
              }
            }`;

            await github.graphql(mutation, {
              projectId: PROJECT_ID,
              itemId: item.id,
              fieldId: STAGE_FIELD_ID,
              optionId: optionId
            });

            console.log(`Synced board to ${newStageLabel} for issue #${context.payload.issue.number}`);

  notify-submitter:
    needs: stage-gate
    if: needs.stage-gate.outputs.notification_event != ''
    uses: ./.github/workflows/send-notifications.yml
    with:
      event_type: ${{ needs.stage-gate.outputs.notification_event }}-submitter
      issue_number: ${{ github.event.issue.number }}
      extra_vars: ${{ needs.stage-gate.outputs.notification_vars }}
      recipients: submitter_only
    secrets:
      POWER_AUTOMATE_WEBHOOK_URL: ${{ secrets.POWER_AUTOMATE_WEBHOOK_URL }}
      ADMIN_NOTIFICATION_EMAILS: ${{ secrets.ADMIN_NOTIFICATION_EMAILS }}

  notify-admins:
    needs: stage-gate
    if: needs.stage-gate.outputs.notification_event != ''
    uses: ./.github/workflows/send-notifications.yml
    with:
      event_type: ${{ needs.stage-gate.outputs.notification_event }}-admin
      issue_number: ${{ github.event.issue.number }}
      extra_vars: ${{ needs.stage-gate.outputs.notification_vars }}
      recipients: admins_only
      notify_admins: true
    secrets:
      POWER_AUTOMATE_WEBHOOK_URL: ${{ secrets.POWER_AUTOMATE_WEBHOOK_URL }}
      ADMIN_NOTIFICATION_EMAILS: ${{ secrets.ADMIN_NOTIFICATION_EMAILS }}
