name: Stage Validation

on:
  issues:
    types: [edited]

jobs:
  check-checklist:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Check Checklist Completion
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';
            const currentLabels = issue.labels.map(l => l.name);

            // Determine current stage
            const currentStage = currentLabels.find(l => l.startsWith('stage:'));
            if (!currentStage) return;

            // Count checkboxes in issue body
            const bodyChecked = (body.match(/- \[x\]/gi) || []).length;
            const bodyUnchecked = (body.match(/- \[ \]/g) || []).length;

            // Also check comments for stage-specific checklists
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              per_page: 100
            });

            let totalChecked = bodyChecked;
            let totalUnchecked = bodyUnchecked;

            // Stage-specific comment checklist names
            const stageChecklistHeaders = {
              'stage:validate': 'Validate Stage Checklist',
              'stage:build': 'Build Stage',
              'stage:sell': 'Sell Stage Checklist',
              'stage:review': 'Review Stage Checklist'
            };

            const header = stageChecklistHeaders[currentStage];
            if (header) {
              for (const comment of comments.data) {
                if (comment.body.includes(header)) {
                  const checked = (comment.body.match(/- \[x\]/gi) || []).length;
                  const unchecked = (comment.body.match(/- \[ \]/g) || []).length;
                  totalChecked += checked;
                  totalUnchecked += unchecked;
                }
              }
            }

            const totalBoxes = totalChecked + totalUnchecked;
            const hasReadyLabel = currentLabels.includes('status:ready-for-review');

            // If all boxes checked and doesn't have ready label, add it
            if (totalBoxes > 0 && totalUnchecked === 0 && !hasReadyLabel) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['status:ready-for-review']
              });

              const stageNames = {
                'stage:ideate': 'Ideate',
                'stage:validate': 'Validate',
                'stage:build': 'Build',
                'stage:sell': 'Sell',
                'stage:review': 'Review'
              };

              const stageName = stageNames[currentStage] || 'current';

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `✅ **All ${stageName} stage checklist items completed!**\n\nThis idea is ready for review and stage transition. An admin will review shortly.`
              });
            }

            // If boxes unchecked and has ready label, remove it
            if (totalUnchecked > 0 && hasReadyLabel) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                name: 'status:ready-for-review'
              });
            }
