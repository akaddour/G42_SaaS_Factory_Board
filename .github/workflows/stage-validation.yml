name: Stage Validation

on:
  issues:
    types: [edited]

permissions:
  issues: write
  contents: read

jobs:
  check-checklist:
    runs-on: ubuntu-latest
    outputs:
      checklist_complete: ${{ steps.check.outputs.checklist_complete }}
    steps:
      - name: Check Checklist Completion
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';
            const currentLabels = issue.labels.map(l => l.name);

            // Determine current stage
            const currentStage = currentLabels.find(l => l.startsWith('stage:'));
            if (!currentStage) return;

            // Count checkboxes in issue body (checklists are appended to the body)
            const checked = (body.match(/- \[x\]/gi) || []).length;
            const unchecked = (body.match(/- \[ \]/g) || []).length;
            const totalBoxes = checked + unchecked;
            const hasReadyLabel = currentLabels.includes('status:ready-for-review');

            // If all boxes checked and doesn't have ready label, add it
            if (totalBoxes > 0 && unchecked === 0 && !hasReadyLabel) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['status:ready-for-review']
              });

              const stageNames = {
                'stage:ideate': 'Ideate',
                'stage:validate': 'Validate',
                'stage:build': 'Build',
                'stage:sell': 'Sell',
                'stage:review': 'Review'
              };

              const stageName = stageNames[currentStage] || 'current';

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `✅ **All ${stageName} stage checklist items completed!**\n\nThis idea is ready for review and stage transition. An admin will review shortly.`
              });

              core.setOutput('checklist_complete', 'true');
            }

            // If boxes unchecked and has ready label, remove it
            if (unchecked > 0 && hasReadyLabel) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                name: 'status:ready-for-review'
              });
            }

  notify-submitter-checklist:
    needs: check-checklist
    if: needs.check-checklist.outputs.checklist_complete == 'true'
    uses: ./.github/workflows/send-notifications.yml
    with:
      event_type: checklist-complete-submitter
      issue_number: ${{ github.event.issue.number }}
      recipients: submitter_only
    secrets:
      POWER_AUTOMATE_WEBHOOK_URL: ${{ secrets.POWER_AUTOMATE_WEBHOOK_URL }}
      ADMIN_NOTIFICATION_EMAILS: ${{ secrets.ADMIN_NOTIFICATION_EMAILS }}

  notify-admins-checklist:
    needs: check-checklist
    if: needs.check-checklist.outputs.checklist_complete == 'true'
    uses: ./.github/workflows/send-notifications.yml
    with:
      event_type: checklist-complete-admin
      issue_number: ${{ github.event.issue.number }}
      recipients: admins_only
      notify_admins: true
    secrets:
      POWER_AUTOMATE_WEBHOOK_URL: ${{ secrets.POWER_AUTOMATE_WEBHOOK_URL }}
      ADMIN_NOTIFICATION_EMAILS: ${{ secrets.ADMIN_NOTIFICATION_EMAILS }}
